# Kanban Tools — local container orchestration.
#
#   docker compose up --build
#
# Brings up the app with FFmpeg, Poppler, Ghostscript, and yt-dlp baked into the
# image. Job files live on a named volume and are auto-deleted by the in-app
# cleanup worker according to JOB_TTL_MINUTES.

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: kanban-tools:latest
    container_name: kanban-tools
    ports:
      - "3000:3000"
    environment:
      # See .env.example for the full list of options.
      NODE_ENV: production
      CONVERT_JOBS_DIR: /data/convert-jobs
      MAX_FILE_SIZE_MB: "512"
      JOB_TTL_MINUTES: "30"
      CLEANUP_INTERVAL_MINUTES: "5"
      ENABLE_LINK_DOWNLOADER: "true"
      # yt-dlp is installed in the image and on PATH.
      YTDLP_PATH: yt-dlp
    volumes:
      # Persist job working files across restarts (still auto-cleaned by TTL).
      - jobs-data:/data/convert-jobs
    restart: unless-stopped
    # Conversions can be memory-hungry; raise if you process large media.
    # mem_limit: 2g
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://127.0.0.1:3000/api/capabilities').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

volumes:
  jobs-data:
