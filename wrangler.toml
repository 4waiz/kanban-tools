# Cloudflare Pages configuration for Kanban Tools (static export).
# https://developers.cloudflare.com/pages/
#
# This is a fully static site (no Functions, no server). Cloudflare Pages builds
# it with `npm run build` and serves the `out/` directory. The COOP/COEP and
# security headers come from public/_headers (copied into out/ at build time),
# which is required for ffmpeg.wasm to run.
#
# You can deploy either way:
#   1. Git integration (recommended): connect the repo in the Pages dashboard
#      with Build command = `npm run build` and Output directory = `out`.
#   2. Direct upload:  npx wrangler pages deploy out --project-name kanban-tools

name = "kanban-tools"
pages_build_output_dir = "out"
compatibility_date = "2025-01-01"
