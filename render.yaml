# Render Blueprint for Kanban Tools.
# Docs: https://render.com/docs/blueprint-spec
#
# This deploys the existing Dockerfile as a web service. Render injects PORT
# (default 10000); the app binds it via the PORT/HOSTNAME env baked into the
# Dockerfile/next standalone server.
#
# FREE TIER configuration:
#  - No persistent disk (free plan can't mount one), so job files live in the
#    container's ephemeral /tmp and are lost on restart/redeploy/sleep. That's
#    fine: jobs are short-lived and auto-deleted anyway. Downloads just need to
#    happen reasonably soon after conversion.
#  - The free service SLEEPS after ~15 min idle and cold-starts on the next
#    request (first hit can take ~30-60s). Upgrade to a paid plan + add a disk
#    later for always-on + durable files.
#
# To use: in Render -> "New +" -> "Blueprint" and point it at this repo.

services:
  - type: web
    name: kanban-tools
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      # Ephemeral storage on the free tier (no mounted disk).
      - key: CONVERT_JOBS_DIR
        value: /tmp/convert-jobs
      - key: MAX_FILE_SIZE_MB
        value: "512"
      - key: JOB_TTL_MINUTES
        value: "30"
      - key: CLEANUP_INTERVAL_MINUTES
        value: "5"
      - key: ENABLE_LINK_DOWNLOADER
        value: "true"
      - key: YTDLP_PATH
        value: yt-dlp
      - key: LOG_LEVEL
        value: info
      # Keep concurrency low on the small free instance to avoid OOM.
      - key: WORKER_CONCURRENCY
        value: "1"
      # Disk quota guard sized for the small ephemeral /tmp on free instances.
      - key: MAX_TOTAL_DISK_BYTES
        value: "1073741824" # 1 GB
